<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link href="style.css" rel="stylesheet"/>
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Datatype:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
<main>
<section class="projects-section">
    <div class="projects-container">
        <h2>Tanganyika courts</h2>
        <div class="dimensions-container">
            <p>[1150M<sup>2</sup>]</p>
            <p>[ATHI RIVER]</p>
            <p>[2026]</p>
        </div>
        <div class="paragraph-container">
            <p>Built in the outskirts of machakos county, not far from Nairobi, 
                lies a very stategic and affordable flats</p>
        </div>
        <div class="button-container">
            <button class="direction" id="back-el">⏮</button>
            <button class="direction" id="button-el">⏭</button>
        </div>
        <div class="project">
            <p>Charlet twins & brothers</p>
            <p>480M<sup>2</sup></p>
            <p>Loresho</p>
        </div>
        <div class="image-container">
            <img id="img-el" src="./images/square1.jpg"></img>
        </div>
    </div>
</section>
</main>
</body>
</html>
